<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Grazie per la vostra richiesta.</title><style>:root{--green:#ABD037;--line:#e2e6dc;--dark:#1f2430}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--dark);background:linear-gradient(180deg,#fff,#f8faf5);min-height:100vh;display:grid;place-items:center;padding:24px}.box{max-width:760px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:42px;box-shadow:0 18px 50px rgba(31,36,48,.12);text-align:center}.logo{width:260px;max-width:85%;height:auto;margin:0 auto 24px;display:block}h1{font-size:42px;line-height:1.05;margin:0 0 14px;letter-spacing:-1px}p{color:#555b63;font-size:18px;line-height:1.55}.btn{display:inline-flex;margin-top:20px;align-items:center;justify-content:center;min-height:48px;padding:13px 22px;border-radius:999px;background:var(--green);color:#1f360f;text-decoration:none;font-weight:700}@media(max-width:640px){.box{padding:30px 22px}h1{font-size:34px}p{font-size:16px}}</style></head><body><main class="box"><img class="logo" src="../assets/logo-hotelinnovativ-original.png" alt="Hotelinnovativ"><h1>Grazie per la vostra richiesta.</h1><p>I vostri dati sono stati trasmessi con successo. Hotelinnovativ vi contatterà con una prima raccomandazione su pacchetto, infrastruttura e possibili estensioni.</p><a class="btn" href="../">Hotelinnovativ</a></main></body></html>
